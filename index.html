<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Profit & Ad Tracker | Technical Dashboard</title>
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap');
        
        :root {
            --bg: #F4F4F2;
            --ink: #141414;
            --line: #141414;
            --f-mono: 'JetBrains Mono', monospace;
            --f-sans: 'Inter', sans-serif;
            --f-serif: 'Cormorant Garamond', serif;
        }

        body { 
            font-family: var(--f-sans);
            background-color: var(--bg);
            color: var(--ink);
        }

        .technical-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
        }

        .technical-cell {
            padding: 1.5rem;
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            transition: all 0.2s ease;
        }

        .technical-cell:hover {
            background: var(--ink);
            color: var(--bg);
        }

        .technical-cell:hover .text-muted {
            color: rgba(244, 244, 242, 0.6);
        }

        .technical-cell:hover i {
            color: var(--bg) !important;
        }

        .data-value {
            font-family: var(--f-mono);
            letter-spacing: -0.02em;
        }

        .col-header {
            font-family: var(--f-serif);
            font-style: italic;
            font-size: 12px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Custom Table Style */
        .tech-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--line);
        }
        .tech-table th {
            font-family: var(--f-serif);
            font-style: italic;
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--line);
            border-right: 1px solid var(--line);
            background: rgba(20, 20, 20, 0.03);
        }
        .tech-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--line);
            border-right: 1px solid var(--line);
            font-family: var(--f-mono);
            font-size: 13px;
        }
        .tech-table tr:hover {
            background: var(--ink);
            color: var(--bg);
        }

        .sidebar-item {
            border-bottom: 1px solid var(--line);
            transition: all 0.2s ease;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: var(--ink);
            color: var(--bg);
        }

        input, select {
            background: transparent;
            border: 1px solid var(--line);
            padding: 0.5rem 1rem;
            font-family: var(--f-mono);
            font-size: 13px;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            background: white;
        }

        .btn-primary {
            background: var(--ink);
            color: var(--bg);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            border: 1px solid var(--line);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: transparent;
            color: var(--ink);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const RechartsLib = window.Recharts || window.recharts;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar 
        } = RechartsLib || {};

        // --- Storage Logic ---
        const STORAGE_KEYS = {
            PRODUCTS: 'ecom_v2_products',
            AD_SPEND: 'ecom_v2_ad_spend',
            ORDERS: 'ecom_v2_orders'
        };

        const getStorage = (key) => {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : [];
            } catch (e) { return []; }
        };

        const setStorage = (key, data) => {
            try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) {}
        };

        const storage = {
            getProducts: () => getStorage(STORAGE_KEYS.PRODUCTS),
            addProduct: (product) => {
                const products = getStorage(STORAGE_KEYS.PRODUCTS);
                const newProduct = { ...product, id: Date.now() };
                setStorage(STORAGE_KEYS.PRODUCTS, [...products, newProduct]);
                return newProduct;
            },
            deleteProduct: (id) => {
                const products = getStorage(STORAGE_KEYS.PRODUCTS).filter(p => p.id !== id);
                setStorage(STORAGE_KEYS.PRODUCTS, products);
            },
            getAdSpend: () => getStorage(STORAGE_KEYS.AD_SPEND),
            addAdSpend: (entry) => {
                const adSpend = getStorage(STORAGE_KEYS.AD_SPEND);
                setStorage(STORAGE_KEYS.AD_SPEND, [...adSpend, { ...entry, id: Date.now() }]);
            },
            deleteAdSpend: (id) => {
                const adSpend = getStorage(STORAGE_KEYS.AD_SPEND).filter(a => a.id !== id);
                setStorage(STORAGE_KEYS.AD_SPEND, adSpend);
            },
            getOrders: () => getStorage(STORAGE_KEYS.ORDERS),
            addOrder: (order) => {
                const orders = getStorage(STORAGE_KEYS.ORDERS);
                setStorage(STORAGE_KEYS.ORDERS, [...orders, { ...order, id: Date.now() }]);
            },
            deleteOrder: (id) => {
                const orders = getStorage(STORAGE_KEYS.ORDERS).filter(o => o.id !== id);
                setStorage(STORAGE_KEYS.ORDERS, orders);
            },
            updateOrderStatus: (id, status) => {
                const orders = getStorage(STORAGE_KEYS.ORDERS).map(o => o.id === id ? { ...o, status } : o);
                setStorage(STORAGE_KEYS.ORDERS, orders);
            }
        };

        // --- Components ---
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const StatCell = ({ title, value, icon, subValue }) => (
            <div className="technical-cell">
                <div className="flex justify-between items-start mb-4">
                    <span className="col-header">{title}</span>
                    <Icon name={icon} className="text-zinc-400" />
                </div>
                <div className="data-value text-3xl font-bold mb-1">{value}</div>
                {subValue && <div className="text-[10px] font-mono opacity-60 uppercase tracking-tighter">{subValue}</div>}
            </div>
        );

        function App() {
            const [view, setView] = useState('dashboard');
            const [products, setProducts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [adSpend, setAdSpend] = useState([]);

            const [form, setForm] = useState({
                product: { name: '', cost: '', delivery: '', price: '' },
                ad: { product_id: '', date: new Date().toISOString().split('T')[0], amount: '' },
                order: { product_id: '', date: new Date().toISOString().split('T')[0], customer: '', phone: '', status: 'pending' }
            });

            const load = () => {
                setProducts(storage.getProducts());
                setOrders(storage.getOrders());
                setAdSpend(storage.getAdSpend());
                setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 0);
            };

            useEffect(() => { load(); }, []);

            const stats = useMemo(() => {
                return products.map(p => {
                    const productAds = adSpend.filter(a => Number(a.product_id) === p.id).reduce((s, a) => s + Number(a.amount), 0);
                    const confirmed = orders.filter(o => Number(o.product_id) === p.id && o.status === 'confirmed');
                    const revenue = confirmed.length * Number(p.price);
                    const totalCost = confirmed.length * (Number(p.cost) + Number(p.delivery));
                    const profit = revenue - totalCost - productAds;
                    return { ...p, productAds, confirmedCount: confirmed.length, revenue, profit, roas: productAds > 0 ? (revenue / productAds).toFixed(2) : 0 };
                });
            }, [products, orders, adSpend]);

            const chartData = useMemo(() => {
                const days = [];
                for (let i = 14; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const dailyAds = adSpend.filter(a => a.date === ds).reduce((s, a) => s + Number(a.amount), 0);
                    const dailyRev = orders.filter(o => o.date === ds && o.status === 'confirmed').reduce((s, o) => {
                        const p = products.find(prod => prod.id === Number(o.product_id));
                        return s + (p ? Number(p.price) : 0);
                    }, 0);
                    days.push({ date: ds.slice(5), revenue: dailyRev, ads: dailyAds });
                }
                return days;
            }, [products, orders, adSpend]);

            const totals = {
                revenue: stats.reduce((s, p) => s + p.revenue, 0),
                profit: stats.reduce((s, p) => s + p.profit, 0),
                ads: stats.reduce((s, p) => s + p.productAds, 0),
                orders: orders.filter(o => o.status === 'confirmed').length
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 border-r border-black flex flex-col bg-white">
                        <div className="p-8 border-b border-black">
                            <h1 className="font-serif italic text-2xl font-bold tracking-tight">Ecom.OS</h1>
                            <p className="text-[10px] font-mono opacity-50 uppercase mt-1">v2.0.0 // Standalone</p>
                        </div>
                        <nav className="flex-1">
                            {[
                                { id: 'dashboard', label: 'Overview', icon: 'layout-grid' },
                                { id: 'products', label: 'Inventory', icon: 'package' },
                                { id: 'entry', label: 'Data Entry', icon: 'plus-square' },
                                { id: 'orders', label: 'Logistics', icon: 'truck' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setView(item.id)}
                                    className={`sidebar-item w-full flex items-center gap-4 px-8 py-4 text-sm font-medium uppercase tracking-widest ${view === item.id ? 'active' : ''}`}
                                >
                                    <Icon name={item.icon} size={16} />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-8 border-t border-black bg-zinc-50">
                            <div className="flex items-center gap-2 text-[10px] font-mono uppercase">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                System Operational
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto bg-[#F4F4F2]">
                        <header className="p-8 border-b border-black flex justify-between items-end bg-white">
                            <div>
                                <h2 className="font-serif italic text-4xl">{view === 'dashboard' ? 'Market Performance' : view.charAt(0).toUpperCase() + view.slice(1)}</h2>
                                <p className="text-xs font-mono opacity-50 mt-2 uppercase tracking-widest">UTC: {new Date().toISOString().slice(0,16).replace('T', ' ')}</p>
                            </div>
                            <button onClick={load} className="p-2 border border-black hover:bg-black hover:text-white transition-all">
                                <Icon name="refresh-ccw" size={16} />
                            </button>
                        </header>

                        <div className="p-0">
                            {view === 'dashboard' && (
                                <div className="animate-in fade-in duration-500">
                                    <div className="technical-grid">
                                        <StatCell title="Gross Revenue" value={`₦${totals.revenue.toLocaleString()}`} icon="dollar-sign" subValue={`${totals.orders} Confirmed Orders`} />
                                        <StatCell title="Net Profit" value={`₦${totals.profit.toLocaleString()}`} icon="trending-up" subValue={`ROI: ${totals.ads > 0 ? ((totals.profit / totals.ads) * 100).toFixed(1) : 0}%`} />
                                        <StatCell title="Ad Investment" value={`₦${totals.ads.toLocaleString()}`} icon="target" subValue={`Avg ROAS: ${totals.ads > 0 ? (totals.revenue / totals.ads).toFixed(2) : 0}x`} />
                                        <StatCell title="Efficiency" value={`${totals.revenue > 0 ? ((totals.profit / totals.revenue) * 100).toFixed(1) : 0}%`} icon="zap" subValue="Profit Margin" />
                                    </div>

                                    <div className="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 border border-black bg-white p-8">
                                            <div className="flex justify-between items-center mb-8">
                                                <h3 className="col-header">14-Day Trajectory</h3>
                                                <div className="flex gap-4 text-[10px] font-mono uppercase">
                                                    <span className="flex items-center gap-1"><span className="w-2 h-2 bg-emerald-500"></span> Revenue</span>
                                                    <span className="flex items-center gap-1"><span className="w-2 h-2 bg-orange-500"></span> Ads</span>
                                                </div>
                                            </div>
                                            <div className="h-64">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <AreaChart data={chartData}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eee" />
                                                        <XAxis dataKey="date" tick={{fontSize: 10, fontFamily: 'JetBrains Mono'}} axisLine={{stroke: '#000'}} />
                                                        <YAxis tick={{fontSize: 10, fontFamily: 'JetBrains Mono'}} axisLine={{stroke: '#000'}} />
                                                        <Tooltip contentStyle={{fontFamily: 'JetBrains Mono', fontSize: '12px', border: '1px solid black', borderRadius: '0'}} />
                                                        <Area type="stepAfter" dataKey="revenue" stroke="#10b981" fill="#10b981" fillOpacity={0.1} strokeWidth={2} />
                                                        <Area type="stepAfter" dataKey="ads" stroke="#f97316" fill="transparent" strokeWidth={1} strokeDasharray="4 4" />
                                                    </AreaChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>

                                        <div className="border border-black bg-white p-8">
                                            <h3 className="col-header mb-6">Product Breakdown</h3>
                                            <div className="space-y-6">
                                                {stats.map(p => (
                                                    <div key={p.id} className="group">
                                                        <div className="flex justify-between items-end mb-2">
                                                            <span className="text-sm font-bold uppercase tracking-tight">{p.name}</span>
                                                            <span className="data-value text-xs">₦{p.profit.toLocaleString()}</span>
                                                        </div>
                                                        <div className="w-full h-1 bg-zinc-100">
                                                            <div 
                                                                className="h-full bg-black transition-all duration-1000" 
                                                                style={{ width: `${Math.min(100, (p.revenue / (totals.revenue || 1)) * 100)}%` }}
                                                            ></div>
                                                        </div>
                                                    </div>
                                                ))}
                                                {stats.length === 0 && <p className="text-center py-12 text-xs font-mono opacity-40">No Data Available</p>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="px-8 pb-8">
                                        <table className="tech-table bg-white">
                                            <thead>
                                                <tr>
                                                    <th>Product Entity</th>
                                                    <th>Vol.</th>
                                                    <th>Revenue</th>
                                                    <th>Marketing</th>
                                                    <th>Net Result</th>
                                                    <th>Index</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {stats.map(p => (
                                                    <tr key={p.id}>
                                                        <td className="font-bold">{p.name}</td>
                                                        <td>{p.confirmedCount}</td>
                                                        <td>₦{p.revenue.toLocaleString()}</td>
                                                        <td>₦{p.productAds.toLocaleString()}</td>
                                                        <td className={p.profit >= 0 ? "text-emerald-600" : "text-red-600"}>₦{p.profit.toLocaleString()}</td>
                                                        <td>{p.roas}x</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {view === 'products' && (
                                <div className="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in slide-in-from-bottom-4 duration-500">
                                    <div className="border border-black p-8 bg-white">
                                        <h3 className="col-header mb-6">Register New Entity</h3>
                                        <form className="space-y-6" onSubmit={(e) => {
                                            e.preventDefault();
                                            if (!form.product.name) return;
                                            storage.addProduct(form.product);
                                            setForm({...form, product: {name: '', cost: '', delivery: '', price: ''}});
                                            load();
                                        }}>
                                            <div>
                                                <label className="text-[10px] font-mono uppercase block mb-1">Entity Name</label>
                                                <input value={form.product.name} onChange={e => setForm({...form, product: {...form.product, name: e.target.value}})} placeholder="e.g. Wireless Earbuds" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[10px] font-mono uppercase block mb-1">Unit Cost</label>
                                                    <input type="number" value={form.product.cost} onChange={e => setForm({...form, product: {...form.product, cost: e.target.value}})} placeholder="0.00" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-mono uppercase block mb-1">Logistics</label>
                                                    <input type="number" value={form.product.delivery} onChange={e => setForm({...form, product: {...form.product, delivery: e.target.value}})} placeholder="0.00" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-mono uppercase block mb-1">Retail Price</label>
                                                <input type="number" value={form.product.price} onChange={e => setForm({...form, product: {...form.product, price: e.target.value}})} placeholder="0.00" />
                                            </div>
                                            <button className="btn-primary w-full">Commit to Registry</button>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-2 space-y-4">
                                        {products.map(p => (
                                            <div key={p.id} className="border border-black p-6 bg-white flex justify-between items-center hover:bg-black hover:text-white group transition-all">
                                                <div className="flex items-center gap-6">
                                                    <div className="w-12 h-12 border border-black flex items-center justify-center group-hover:border-white">
                                                        <Icon name="package" />
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold uppercase tracking-tighter text-lg">{p.name}</h4>
                                                        <p className="text-[10px] font-mono opacity-60 uppercase">Cost: ₦{p.cost} // Retail: ₦{p.price}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => { storage.deleteProduct(p.id); load(); }} className="p-2 border border-transparent hover:border-red-500 text-zinc-400 hover:text-red-500 transition-all">
                                                    <Icon name="trash-2" size={18} />
                                                </button>
                                            </div>
                                        ))}
                                        {products.length === 0 && <div className="border border-black border-dashed p-24 text-center text-xs font-mono uppercase opacity-30">Registry Empty</div>}
                                    </div>
                                </div>
                            )}

                            {view === 'entry' && (
                                <div className="p-8 grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in slide-in-from-bottom-4 duration-500">
                                    <div className="space-y-8">
                                        <div className="border border-black p-8 bg-white">
                                            <h3 className="col-header mb-6">Marketing Expenditure</h3>
                                            <form className="space-y-6" onSubmit={e => {
                                                e.preventDefault();
                                                if (!form.ad.product_id || !form.ad.amount) return;
                                                storage.addAdSpend(form.ad);
                                                setForm({...form, ad: {...form.ad, amount: ''}});
                                                load();
                                            }}>
                                                <select value={form.ad.product_id} onChange={e => setForm({...form, ad: {...form.ad, product_id: e.target.value}})}>
                                                    <option value="">Select Entity</option>
                                                    {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                </select>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input type="date" value={form.ad.date} onChange={e => setForm({...form, ad: {...form.ad, date: e.target.value}})} />
                                                    <input type="number" placeholder="Amount (₦)" value={form.ad.amount} onChange={e => setForm({...form, ad: {...form.ad, amount: e.target.value}})} />
                                                </div>
                                                <button className="btn-primary w-full">Record Spend</button>
                                            </form>
                                        </div>

                                        <div className="border border-black p-8 bg-white">
                                            <h3 className="col-header mb-6">Marketing Log</h3>
                                            <div className="space-y-3 max-h-80 overflow-y-auto no-scrollbar">
                                                {adSpend.slice().reverse().map(a => (
                                                    <div key={a.id} className="flex justify-between items-center p-4 border border-black hover:bg-black hover:text-white group transition-all">
                                                        <div>
                                                            <div className="text-xs font-bold uppercase tracking-tight">{products.find(p => p.id === Number(a.product_id))?.name || 'Unknown'}</div>
                                                            <div className="text-[10px] font-mono opacity-50">{a.date}</div>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <div className="data-value font-bold text-sm">₦{Number(a.amount).toLocaleString()}</div>
                                                            <button onClick={() => { if(confirm('Delete this record?')) { storage.deleteAdSpend(a.id); load(); } }} className="text-zinc-400 hover:text-red-500 transition-colors">
                                                                <Icon name="trash-2" size={14} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                                {adSpend.length === 0 && <p className="text-center py-12 text-xs font-mono opacity-30 uppercase">No Expenditure Logged</p>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="border border-black p-8 bg-white self-start">
                                        <h3 className="col-header mb-6">Sales Acquisition</h3>
                                        <form className="space-y-4" onSubmit={e => {
                                            e.preventDefault();
                                            if (!form.order.product_id || !form.order.customer) return;
                                            storage.addOrder(form.order);
                                            setForm({...form, order: {...form.order, customer: '', phone: ''}});
                                            load();
                                        }}>
                                            <select value={form.order.product_id} onChange={e => setForm({...form, order: {...form.order, product_id: e.target.value}})}>
                                                <option value="">Select Entity</option>
                                                {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="date" value={form.order.date} onChange={e => setForm({...form, order: {...form.order, date: e.target.value}})} />
                                                <select value={form.order.status} onChange={e => setForm({...form, order: {...form.order, status: e.target.value}})}>
                                                    <option value="pending">Pending</option>
                                                    <option value="confirmed">Confirmed</option>
                                                </select>
                                            </div>
                                            <input placeholder="Customer Name" value={form.order.customer} onChange={e => setForm({...form, order: {...form.order, customer: e.target.value}})} />
                                            <input placeholder="Phone Contact" value={form.order.phone} onChange={e => setForm({...form, order: {...form.order, phone: e.target.value}})} />
                                            <button className="btn-primary w-full">Log Order</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {view === 'orders' && (
                                <div className="p-8 animate-in slide-in-from-bottom-4 duration-500">
                                    <div className="bg-white border border-black">
                                        <div className="p-6 border-b border-black flex justify-between items-center">
                                            <h3 className="col-header">Transaction Log</h3>
                                            <div className="flex gap-4 text-[10px] font-mono uppercase">
                                                <span>Pending: {orders.filter(o => o.status === 'pending').length}</span>
                                                <span>Confirmed: {orders.filter(o => o.status === 'confirmed').length}</span>
                                            </div>
                                        </div>
                                        <table className="tech-table">
                                            <thead>
                                                <tr>
                                                    <th>Timestamp</th>
                                                    <th>Client Details</th>
                                                    <th>Entity</th>
                                                    <th>Status</th>
                                                    <th>Operations</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {orders.map(o => (
                                                    <tr key={o.id}>
                                                        <td>{o.date}</td>
                                                        <td>
                                                            <div className="font-bold">{o.customer}</div>
                                                            <div className="opacity-50">{o.phone}</div>
                                                        </td>
                                                        <td>{products.find(p => p.id === Number(o.product_id))?.name || 'Unknown'}</td>
                                                        <td>
                                                            <span className={`px-2 py-0.5 border ${o.status === 'confirmed' ? 'border-emerald-500 text-emerald-600' : 'border-orange-500 text-orange-600'} text-[9px] font-bold uppercase`}>
                                                                {o.status}
                                                            </span>
                                                        </td>
                                                        <td className="flex gap-4">
                                                            <button 
                                                                onClick={() => { storage.updateOrderStatus(o.id, o.status === 'confirmed' ? 'pending' : 'confirmed'); load(); }}
                                                                className="text-[10px] uppercase font-bold hover:underline"
                                                            >
                                                                Toggle
                                                            </button>
                                                            <button onClick={() => { if(confirm('Delete this order?')) { storage.deleteOrder(o.id); load(); } }} className="text-zinc-400 hover:text-red-500">
                                                                <Icon name="trash-2" size={14} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {orders.length === 0 && <tr><td colSpan="5" className="text-center py-24 text-xs font-mono uppercase opacity-30">No Transactions Found</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
